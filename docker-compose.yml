services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3101
      DATABASE_URL: file:./data/habit-tracker.db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      AUTH_BYPASS_ENABLED: ${AUTH_BYPASS_ENABLED:-false}
      AUTH_BYPASS_EMAIL: ${AUTH_BYPASS_EMAIL:-internal@cycle.local}
      AUTH_BYPASS_DISPLAY_NAME: ${AUTH_BYPASS_DISPLAY_NAME:-Internal User}
      EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3101}:3101"
    volumes:
      - habit_tracker_data:/app/apps/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-__AUTO__}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  habit_tracker_data:
